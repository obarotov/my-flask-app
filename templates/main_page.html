<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otabek Barotov | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #dd4b39; --bg-dark: #0f172a; }
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(221, 75, 57, 0.1) 0%, transparent 40%);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 3.5rem;
            max-width: 600px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        h1 { font-weight: 800; font-size: 3.5rem; margin-bottom: 1rem; letter-spacing: -2px; }
        .red-text { color: var(--brand-red); }
        p { color: #94a3b8; font-size: 1.2rem; line-height: 1.6; }
        .nav-buttons { margin-top: 2.5rem; }
        .btn-red {
            background: var(--brand-red);
            color: white;
            padding: 12px 35px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: all 0.3s ease;
            margin-right: 15px;
        }
        .btn-red:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(221, 75, 57, 0.4); color: white; }
        .btn-outline {
            border: 2px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 35px;
            border-radius: 14px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: white; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="profile-card">
            <h1>Otabek <span class="red-text">Barotov</span></h1>
            <p>I'm a student at <strong>DII</strong>, currently searching for a new university. If you'd like to collaborate or help, feel free to reach out!</p>
            <div class="nav-buttons">
                <a href="/about" class="btn-red">About</a>
                <a href="/students" class="btn-outline">Students</a>
            </div>
        </div>
    </div>
</body>
</html>
