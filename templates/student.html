<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }}'s Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-red: #dd4b39; 
            --bg-dark: #0f172a; 
            --card-bg: rgba(255, 255, 255, 0.02);
        }
        
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, rgba(221, 75, 57, 0.12) 0%, transparent 50%);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .label {
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .student-name {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .score-big {
            font-size: 2rem;
            font-weight: 800;
            color: var(--brand-red);
        }

        .status-badge {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f8fafc;
        }

        /* Dynamic Border colors based on score status */
        .border-excellent { border-top: 4px solid #22c55e; }
        .border-good { border-top: 4px solid #3b82f6; }
        .border-improvement { border-top: 4px solid #f59e0b; }
        .border-nodata { border-top: 4px solid #64748b; }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-custom {
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            display: block;
        }

        .btn-main {
            background: var(--brand-red);
            color: white;
        }

        .btn-main:hover {
            background: #c23b2b;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(221, 75, 57, 0.2);
        }

        .btn-back {
            color: #64748b;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-back:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="profile-card border-{{ 'excellent' if result == 'Excellent' else 'good' if result == 'Good' else 'improvement' if result == 'Needs improvement' else 'nodata' }}">
        <div class="label">Student Profile</div>
        <h1 class="student-name">{{ name }}</h1>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="label">Score</div>
                <div class="score-big">{{ score }}%</div>
            </div>
            <div class="stat-item">
                <div class="label">Status</div>
                <div class="status-badge">{{ result }}</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="/students" class="btn-custom btn-main">View Leaderboard</a>
            <a href="/" class="btn-custom btn-back">Back to Home</a>
        </div>
    </div>

</body>
</html>
