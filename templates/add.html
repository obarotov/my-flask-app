<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student | Scoreboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #dd4b39; --bg-dark: #0f172a; }
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 90% 10%, rgba(221, 75, 57, 0.1) 0%, transparent 40%);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        h2 { font-weight: 800; font-size: 2.2rem; margin-bottom: 1.5rem; letter-spacing: -1px; }
        .red-text { color: var(--brand-red); }
        
        .form-label { color: #94a3b8; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; margin-top: 1rem; }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 12px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--brand-red);
            box-shadow: none;
            color: white;
        }

        .error-msg {
            background: rgba(221, 75, 57, 0.1);
            border-left: 4px solid var(--brand-red);
            color: #ff8a7d;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .btn-red {
            background: var(--brand-red);
            color: white;
            padding: 12px 35px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 2rem;
        }
        .btn-red:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(221, 75, 57, 0.4); }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="profile-card">
            <h2>Add <span class="red-text">Student</span></h2>
            
            {% if error %}
            <div class="error-msg">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter name..." required autofocus>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Exam Score (0-100)</label>
                    <input type="number" name="score" class="form-control" placeholder="85" min="0" max="100" required>
                </div>

                <button type="submit" class="btn-red">Save to Database</button>
            </form>

            <a href="/students" class="back-link">← Cancel and return</a>
        </div>
    </div>
</body>
</html>
